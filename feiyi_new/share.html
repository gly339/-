<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品生成分享 - 非遗新生</title>
    <link rel="stylesheet" href="styles/share.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- 固定导航栏 -->
    <nav class="navbar fixed-top">
        <div class="nav-container">
            <!-- 左侧LOGO -->
            <div class="logo-section">
                <div class="logo-wrapper">
                    <div class="logo">
                        <svg width="60" height="60" viewBox="0 0 60 60">
                            <circle cx="30" cy="30" r="28" fill="#C41E3A" stroke="#D4AF37" stroke-width="2"/>
                            <path d="M20 20 Q30 15 40 20 T50 25 L45 35 Q30 45 15 35 Z" fill="white" stroke="#1A1A1A" stroke-width="1"/>
                            <path d="M15 25 Q30 30 45 25" fill="none" stroke="#D4AF37" stroke-width="1"/>
                        </svg>
                    </div>
                    <span class="logo-text">非遗新生</span>
                </div>
            </div>

            <!-- 中间导航菜单 -->
            <div class="menu-section">
                <ul class="nav-menu">
                    <li><a href="index.html" class="nav-link">首页</a></li>
                    <li><a href="exhibition.html" class="nav-link">非遗展馆</a></li>
                    <li><a href="workshop.html" class="nav-link">虚拟工坊</a></li>
                    <li><a href="quiz.html" class="nav-link">答题闯关</a></li>
                    <li><a href="map.html" class="nav-link">地域地图</a></li>
                </ul>
            </div>

            <!-- 右侧功能 -->
            <div class="right-section">
                <div class="nav-icons">
                    <i class="fas fa-heart nav-icon"></i>
                    <i class="fas fa-history nav-icon"></i>
                </div>
            </div>
        </div>
    </nav>

    <!-- 成品展示区域 -->
    <section class="product-showcase">
        <div class="container">
            <div class="showcase-grid">
                <div class="product-display">
                    <div class="product-image-container">
                        <div class="product-image">
                            <svg width="400" height="400" viewBox="0 0 400 400">
                                <defs>
                                    <pattern id="foldPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
                                        <path d="M0,0 L20,20 M20,0 L0,20" stroke="#C41E3A" stroke-width="1" opacity="0.3"/>
                                    </pattern>
                                </defs>
                                <rect x="0" y="0" width="400" height="400" fill="url(#foldPattern)"/>
                                <path d="M200,100 Q250,120 280,170 T300,250 L270,300 Q200,330 130,300 L100,250 Q80,170 130,120 Z"
                                      fill="#C41E3A" opacity="0.8"/>
                                <circle cx="200" cy="200" r="100" fill="white" opacity="0.7"/>
                                <path d="M170,170 Q200,150 230,170 T260,200 L245,230 Q200,250 155,230 Z"
                                      fill="white" opacity="0.9"/>
                                <path d="M120,250 L150,270 L180,250 L200,280 L220,250 L250,270 L280,250"
                                      stroke="#D4AF37" stroke-width="2" fill="none"/>
                            </svg>
                        </div>
                        <div class="product-border"></div>
                    </div>
                    <div class="product-details">
                        <h2 class="product-title">陕西剪纸作品</h2>
                        <p class="product-meaning">剪纸·福字：寓意吉祥如意，福气满满</p>
                        <div class="product-stats">
                            <div class="stat-item">
                                <span class="stat-label">创作时间</span>
                                <span class="stat-value">2026年4月</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-label">创作工坊</span>
                                <span class="stat-value">剪纸工坊</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="action-btn primary" onclick="saveImage()">
                        <i class="fas fa-download"></i>
                        截图保存
                    </button>
                    <button class="action-btn" onclick="startNewWork()">
                        <i class="fas fa-redo"></i>
                        重新制作
                    </button>
                    <button class="action-btn" onclick="goToWorkshop()">
                        <i class="fas fa-tools"></i>
                        返回工坊首页
                    </button>
                    <button class="action-btn" onclick="shareProduct()">
                        <i class="fas fa-share-alt"></i>
                        分享作品
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- 分享弹窗 -->
    <div class="share-modal" id="shareModal">
        <div class="modal-overlay" onclick="closeShareModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>分享作品</h3>
                <button class="close-btn" onclick="closeShareModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="share-options">
                    <div class="share-option" onclick="shareToWechat()">
                        <i class="fab fa-weixin"></i>
                        <span>微信</span>
                    </div>
                    <div class="share-option" onclick="shareToQQ()">
                        <i class="fab fa-qq"></i>
                        <span>QQ</span>
                    </div>
                    <div class="share-option" onclick="shareToWeibo()">
                        <i class="fab fa-weibo"></i>
                        <span>微博</span>
                    </div>
                    <div class="share-option" onclick="copyLink()">
                        <i class="fas fa-link"></i>
                        <span>复制链接</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 提示消息 -->
    <div class="message-toast" id="messageToast"></div>

    <!-- 底部区域 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-left">
                    <p class="copyright">©2026 非遗新生 版权所有</p>
                    <p class="contact">联系我们：info@feiyi-xinsheng.com</p>
                </div>

                <div class="footer-center">
                    <div class="decoration-icons">
                        <i class="fas fa-cut footer-icon"></i>
                        <i class="fas fa-mask footer-icon"></i>
                        <i class="fas fa-paint-brush footer-icon"></i>
                    </div>
                </div>

                <div class="footer-right">
                    <a href="#" class="footer-link">关于我们</a>
                    <a href="#" class="footer-link">使用说明</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="js/share.js"></script>
</body>
</html>

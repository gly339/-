<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>剪纸制作 - 分步数字制作交互 - 非遗新生</title>
    <link rel="stylesheet" href="styles/interactive.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- 简化导航栏 -->
    <nav class="navbar simplified-navbar">
        <div class="nav-container">
            <!-- 左侧返回按钮 -->
            <div class="nav-left">
                <button class="back-btn" onclick="window.location.href='workshop.html'">
                    <i class="fas fa-arrow-left"></i>
                </button>
            </div>

            <!-- LOGO -->
            <div class="logo-section">
                <div class="logo-wrapper">
                    <div class="logo">
                        <svg width="40" height="40" viewBox="0 0 40 40">
                            <circle cx="20" cy="20" r="18" fill="#C41E3A" stroke="#D4AF37" stroke-width="1.5"/>
                            <path d="M13 13 Q20 10 27 13 T32 16 L29 22 Q20 28 11 22 Z" fill="white" stroke="#1A1A1A" stroke-width="0.7"/>
                        </svg>
                    </div>
                    <span class="logo-text">非遗新生</span>
                </div>
            </div>

            <!-- 右侧预留空间 -->
            <div class="nav-right"></div>
        </div>
    </nav>

    <!-- 步骤进度条区域 -->
    <section class="progress-section">
        <div class="container">
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="step-indicators">
                    <div class="step-item active" data-step="1">
                        <div class="step-circle">
                            <span class="step-number">1</span>
                        </div>
                        <div class="step-label">折叠</div>
                    </div>
                    <div class="step-item" data-step="2">
                        <div class="step-circle">
                            <span class="step-number">2</span>
                        </div>
                        <div class="step-label">勾勒</div>
                    </div>
                    <div class="step-item" data-step="3">
                        <div class="step-circle">
                            <span class="step-number">3</span>
                        </div>
                        <div class="step-label">裁剪</div>
                    </div>
                    <div class="step-item" data-step="4">
                        <div class="step-circle">
                            <span class="step-number">4</span>
                        </div>
                        <div class="step-label">展开</div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 操作区域 -->
    <section class="interactive-section">
        <div class="container">
            <div class="interactive-grid">
                <!-- 交互操作区 -->
                <div class="operation-area">
                    <div class="operation-header">
                        <h3 class="operation-title" id="operationTitle">步骤 1：折叠纸张</h3>
                        <p class="operation-desc" id="operationDesc">请拖拽纸张边缘按照提示折叠</p>
                    </div>

                    <div class="workspace">
                        <!-- 根据当前步骤显示不同操作界面 -->
                        <div id="stepContent">
                            <!-- 步骤1：折叠 -->
                            <div class="step-content active" id="step1-content">
                                <div class="paper-sheet" id="paperSheet">
                                    <div class="paper-edge horizontal top" data-edge="top"></div>
                                    <div class="paper-edge horizontal bottom" data-edge="bottom"></div>
                                    <div class="paper-edge vertical left" data-edge="left"></div>
                                    <div class="paper-edge vertical right" data-edge="right"></div>
                                    <div class="paper-center"></div>
                                    <div class="fold-line horizontal" id="foldLineH"></div>
                                    <div class="fold-line vertical" id="foldLineV"></div>
                                </div>
                                <div class="fold-instructions">
                                    <p>点击纸张边缘进行折叠</p>
                                    <button class="fold-btn" onclick="performFold()">执行折叠</button>
                                </div>
                            </div>

                            <!-- 步骤2：纹样勾勒 -->
                            <div class="step-content" id="step2-content">
                                <div class="canvas-container">
                                    <canvas id="drawingCanvas" width="400" height="400"></canvas>
                                    <div class="canvas-overlay">
                                        <div class="canvas-controls">
                                            <button class="tool-btn active" data-tool="pen">
                                                <i class="fas fa-pencil-alt"></i>
                                            </button>
                                            <button class="tool-btn" data-tool="eraser">
                                                <i class="fas fa-eraser"></i>
                                            </button>
                                            <div class="color-picker">
                                                <input type="color" id="brushColor" value="#C41E3A">
                                            </div>
                                            <div class="brush-size">
                                                <input type="range" id="brushSize" min="1" max="20" value="3">
                                            </div>
                                        </div>
                                        <div class="template-selector">
                                            <h4>选择模板</h4>
                                            <div class="templates-grid">
                                                <div class="template-item" data-template="flower">
                                                    <svg width="50" height="50" viewBox="0 0 50 50">
                                                        <circle cx="25" cy="25" r="20" fill="#C41E3A" opacity="0.3"/>
                                                        <path d="M25,5 Q35,15 25,25 T15,35" stroke="#C41E3A" stroke-width="2" fill="none"/>
                                                    </svg>
                                                </div>
                                                <div class="template-item" data-template="bird">
                                                    <svg width="50" height="50" viewBox="0 0 50 50">
                                                        <path d="M25,15 Q30,10 35,15 T40,25 L35,30 Q25,35 15,30 L10,25 Q15,20 25,15 Z" fill="#C41E3A" opacity="0.3"/>
                                                    </svg>
                                                </div>
                                                <div class="template-item" data-template="fish">
                                                    <svg width="50" height="50" viewBox="0 0 50 50">
                                                        <circle cx="20" cy="25" r="12" fill="#C41E3A" opacity="0.3"/>
                                                        <path d="M32,25 L45,20 L40,25 L45,30 Z" fill="#C41E3A" opacity="0.3"/>
                                                    </svg>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- 步骤3：裁剪刻画 -->
                            <div class="step-content" id="step3-content">
                                <div class="cutting-area">
                                    <div class="cutting-instructions">
                                        <p>点击纹样轮廓进行裁剪</p>
                                        <div class="cutting-tools">
                                            <button class="tool-btn active" data-tool="scissors">
                                                <i class="fas fa-cut"></i>
                                            </button>
                                            <button class="tool-btn" data-tool="knife">
                                                <i class="fas fa-ruler-combined"></i>
                                            </button>
                                        </div>
                                    </div>
                                    <div class="cutting-surface" id="cuttingSurface">
                                        <div class="cutting-pattern">
                                            <svg width="300" height="300" viewBox="0 0 300 300">
                                                <path d="M150,50 Q200,70 230,120 T250,200 L220,250 Q150,280 80,250 L50,200 Q30,120 80,70 Z"
                                                      stroke="#C41E3A" stroke-width="2" fill="none" class="cut-line"/>
                                                <circle cx="150" cy="150" r="80" stroke="#C41E3A" stroke-width="2" fill="none" class="cut-line"/>
                                                <line x1="150" y1="70" x2="150" y2="230" stroke="#C41E3A" stroke-width="2" class="cut-line"/>
                                                <line x1="70" y1="150" x2="230" y2="150" stroke="#C41E3A" stroke-width="2" class="cut-line"/>
                                            </svg>
                                        </div>
                                    </div>
                                    <div class="cutting-actions">
                                        <button class="action-btn" onclick="markCutLine()">标记裁剪线</button>
                                        <button class="action-btn primary" onclick="performCut()">执行裁剪</button>
                                    </div>
                                </div>
                            </div>

                            <!-- 步骤4：展开成品 -->
                            <div class="step-content" id="step4-content">
                                <div class="final-preview">
                                    <div class="preview-container">
                                        <div class="final-artwork">
                                            <svg width="300" height="300" viewBox="0 0 300 300">
                                                <defs>
                                                    <pattern id="foldPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
                                                        <path d="M0,0 L20,20 M20,0 L0,20" stroke="#C41E3A" stroke-width="1" opacity="0.3"/>
                                                    </pattern>
                                                </defs>
                                                <rect x="0" y="0" width="300" height="300" fill="url(#foldPattern)"/>
                                                <path d="M150,50 Q200,70 230,120 T250,200 L220,250 Q150,280 80,250 L50,200 Q30,120 80,70 Z"
                                                      fill="#C41E3A" opacity="0.8"/>
                                                <circle cx="150" cy="150" r="60" fill="white" opacity="0.7"/>
                                                <path d="M120,120 Q150,100 180,120 T210,150 L195,180 Q150,200 105,180 Z"
                                                      fill="white" opacity="0.9"/>
                                            </svg>
                                        </div>
                                    </div>
                                    <div class="expand-instructions">
                                        <p>您的剪纸作品已经完成！</p>
                                        <button class="action-btn primary" onclick="expandArtwork()">展开查看</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 实时预览区 -->
                <div class="preview-area">
                    <h4 class="preview-title">实时预览</h4>
                    <div class="preview-container">
                        <div class="current-preview" id="currentPreview">
                            <div class="preview-paper">
                                <div class="preview-fold-lines"></div>
                            </div>
                        </div>
                    </div>
                    <div class="step-hint" id="stepHint">
                        请先完成折叠步骤
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 功能按钮区域 -->
    <section class="action-buttons-section">
        <div class="container">
            <div class="action-buttons">
                <button class="action-btn secondary" id="prevBtn" onclick="goToPrevStep()" disabled>
                    <i class="fas fa-arrow-left"></i>
                    上一步
                </button>
                <button class="action-btn primary" id="nextBtn" onclick="goToNextStep()">
                    下一步
                    <i class="fas fa-arrow-right"></i>
                </button>
                <button class="action-btn" id="resetBtn" onclick="resetCurrentStep()">
                    <i class="fas fa-redo"></i>
                    重置当前步骤
                </button>
                <button class="action-btn" id="helpBtn" onclick="showHelp()">
                    <i class="fas fa-question-circle"></i>
                    查看教程
                </button>
            </div>
        </div>
    </section>

    <!-- 教程模态框 -->
    <div class="tutorial-modal" id="tutorialModal">
        <div class="modal-overlay" onclick="closeTutorialModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="tutorialTitle">折叠步骤教程</h3>
                <button class="close-btn" onclick="closeTutorialModal()">&times;</button>
            </div>
            <div class="modal-body" id="tutorialBody">
                <p>在折叠步骤中，您需要：</p>
                <ol>
                    <li>点击纸张的边缘来选择折叠方向</li>
                    <li>选择合适的折叠方式（对折、四折等）</li>
                    <li>确认折叠效果</li>
                </ol>
            </div>
        </div>
    </section>

    <!-- 提示消息 -->
    <div class="message-toast" id="messageToast"></div>

    <script src="js/interactive.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>非遗答题闯关 - 非遗新生</title>
    <link rel="stylesheet" href="styles/quiz.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- 固定导航栏 -->
    <nav class="navbar fixed-top">
        <div class="nav-container">
            <!-- 左侧LOGO -->
            <div class="logo-section">
                <div class="logo-wrapper">
                    <div class="logo">
                        <svg width="60" height="60" viewBox="0 0 60 60">
                            <circle cx="30" cy="30" r="28" fill="#C41E3A" stroke="#D4AF37" stroke-width="2"/>
                            <path d="M20 20 Q30 15 40 20 T50 25 L45 35 Q30 45 15 35 Z" fill="white" stroke="#1A1A1A" stroke-width="1"/>
                            <path d="M15 25 Q30 30 45 25" fill="none" stroke="#D4AF37" stroke-width="1"/>
                        </svg>
                    </div>
                    <span class="logo-text">非遗新生</span>
                </div>
            </div>

            <!-- 中间导航菜单 -->
            <div class="menu-section">
                <ul class="nav-menu">
                    <li><a href="index.html" class="nav-link">首页</a></li>
                    <li><a href="exhibition.html" class="nav-link">非遗展馆</a></li>
                    <li><a href="workshop.html" class="nav-link">虚拟工坊</a></li>
                    <li><a href="#" class="nav-link active">答题闯关</a></li>
                    <li><a href="map.html" class="nav-link">地域地图</a></li>
                </ul>
            </div>

            <!-- 右侧功能 -->
            <div class="right-section">
                <div class="nav-icons">
                    <i class="fas fa-heart nav-icon"></i>
                    <i class="fas fa-history nav-icon"></i>
                </div>
            </div>
        </div>
    </nav>

    <!-- 答题标题区域 -->
    <section class="quiz-header">
        <div class="container">
            <h1 class="quiz-title">非遗答题闯关</h1>
            <p class="quiz-subtitle">答题学非遗，闯关赢乐趣</p>
        </div>
    </section>

    <!-- 闯关进度区域 -->
    <section class="progress-section">
        <div class="container">
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-info">
                    <span class="progress-text">第<span id="currentLevel">1</span>关/共<span id="totalLevels">5</span>关</span>
                    <span class="score-text">得分：<span id="currentScore">0</span></span>
                </div>
            </div>
        </div>
    </section>

    <!-- 答题区域 -->
    <section class="quiz-content">
        <div class="container">
            <div class="quiz-box">
                <div class="question-container">
                    <h2 class="question-text" id="questionText">中国有多少项世界级非遗代表性项目？</h2>
                </div>

                <div class="options-container">
                    <div class="option-item" data-option="A">
                        <div class="option-letter">A</div>
                        <div class="option-text">50项</div>
                    </div>
                    <div class="option-item" data-option="B">
                        <div class="option-letter">B</div>
                        <div class="option-text">70项</div>
                    </div>
                    <div class="option-item" data-option="C">
                        <div class="option-letter">C</div>
                        <div class="option-text">100项</div>
                    </div>
                    <div class="option-item" data-option="D">
                        <div class="option-letter">D</div>
                        <div class="option-text">130项</div>
                    </div>
                </div>

                <div class="quiz-buttons">
                    <button class="btn-secondary" id="prevBtn" onclick="goToPreviousQuestion()" disabled>
                        <i class="fas fa-arrow-left"></i> 上一题
                    </button>
                    <button class="btn-primary" id="nextBtn" onclick="goToNextQuestion()">
                        下一题 <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- 结果弹窗 -->
    <div class="result-modal" id="resultModal">
        <div class="modal-overlay" onclick="closeResultModal()"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="resultTitle">答题结果</h3>
                <button class="close-btn" onclick="closeResultModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="result-content">
                    <div class="result-icon">
                        <i class="fas fa-trophy"></i>
                    </div>
                    <h4 id="resultMessage">恭喜你完成了所有答题！</h4>
                    <p class="result-score">最终得分：<span id="finalScore">0</span>分</p>
                    <p class="result-comment" id="resultComment">你的表现非常出色！</p>
                </div>
                <div class="modal-actions">
                    <button class="btn-primary" onclick="restartQuiz()">
                        <i class="fas fa-redo"></i> 重新闯关
                    </button>
                    <button class="btn-secondary" onclick="goHome()">
                        <i class="fas fa-home"></i> 返回首页
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 提示弹窗 -->
    <div class="notification-modal" id="notificationModal">
        <div class="modal-overlay" onclick="closeNotificationModal()"></div>
        <div class="modal-content notification-content">
            <div class="modal-body">
                <div class="notification-icon">
                    <i class="fas fa-exclamation-circle"></i>
                </div>
                <h4 id="notificationTitle">提示信息</h4>
                <p id="notificationMessage">这是提示信息内容</p>
                <button class="btn-primary" onclick="closeNotificationModal()">确定</button>
            </div>
        </div>
    </div>

    <!-- 底部区域 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-left">
                    <p class="copyright">©2026 非遗新生 版权所有</p>
                    <p class="contact">联系我们：info@feiyi-xinsheng.com</p>
                </div>

                <div class="footer-center">
                    <div class="decoration-icons">
                        <i class="fas fa-cut footer-icon"></i>
                        <i class="fas fa-mask footer-icon"></i>
                        <i class="fas fa-paint-brush footer-icon"></i>
                    </div>
                </div>

                <div class="footer-right">
                    <a href="#" class="footer-link">关于我们</a>
                    <a href="#" class="footer-link">使用说明</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="js/quiz.js"></script>
</body>
</html>
